# Converted from GitHub Actions — incusbox
# Mirrors: ci.yaml (syntax, shellcheck, install dry-run, profile YAML, assemble)

stages:
  - secret-scan
  - lint
  - test

default:
  image: ubuntu:24.04

# ── Shell syntax ──────────────────────────────────────────────────────────────
syntax:
  stage: lint
  script:
    - |
      failed=0
      for f in incusbox/lib.sh incusbox/incusbox incusbox/incusbox-*; do
        [ -f "$f" ] || continue
        if bash -n "$f"; then echo "OK:   $f"
        else echo "FAIL: $f"; failed=1; fi
      done
      exit $failed
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# ── Shellcheck ────────────────────────────────────────────────────────────────
shellcheck:
  stage: lint
  before_script:
    - apt-get update -qq && apt-get install -y shellcheck
  script:
    - |
      failed=0
      for f in incusbox/lib.sh incusbox/incusbox incusbox/incusbox-*; do
        [ -f "$f" ] || continue
        shell="bash"
        head -1 "$f" | grep -q '#!/bin/sh' && shell="sh"
        if shellcheck --shell="${shell}" --severity=warning \
            --exclude=SC1090,SC1091,SC2154,SC3043 "$f"; then
          echo "OK:   $f"
        else
          echo "FAIL: $f"; failed=1
        fi
      done
      exit $failed
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# ── Install dry-run ───────────────────────────────────────────────────────────
install-dry-run:
  stage: test
  script:
    - bash -n incusbox/install && echo "Install script syntax OK"
    - bash incusbox/install --user --verbose
    - bash incusbox/install --user --update --verbose
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# ── Profile YAML validation ───────────────────────────────────────────────────
profile-yaml:
  stage: test
  before_script:
    - apt-get update -qq && apt-get install -y wget
    - wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
    - chmod +x /usr/local/bin/yq
  script:
    - |
      failed=0
      for f in incusbox/profiles/*.yaml; do
        [ -f "$f" ] || continue
        if yq eval '.' "$f" > /dev/null 2>&1; then echo "OK:   $f"
        else echo "FAIL: $f"; yq eval '.' "$f" || true; failed=1; fi
      done
      exit $failed
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# ── Assemble parser ───────────────────────────────────────────────────────────
assemble-parse:
  stage: test
  script:
    - |
      bash -c '
        eval "$(sed -n "/^parse_yaml_containers()/,/^}/p" incusbox/incusbox-assemble)"
        output="$(parse_yaml_containers incusbox/docs/example-assemble.yaml)"
        echo "${output}"
        count="$(echo "${output}" | grep "^CONTAINER_COUNT=" | cut -d= -f2)"
        [ "${count}" -ge 1 ] || { echo "FAIL: no containers parsed"; exit 1; }
        echo "OK: parser produced output for ${count} containers"
      '
    - |
      out="$(bash incusbox/incusbox-assemble \
        --dry-run --file incusbox/docs/example-assemble.yaml 2>&1)"
      echo "${out}"
      actual="$(printf '%s' "${out}" | grep -c '\[dry-run\]')"
      [ "${actual}" -ge 1 ] || { echo "FAIL: no [dry-run] lines"; exit 1; }
      echo "OK: incusbox-assemble --dry-run produced ${actual} lines"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

secret-scan:
  stage: secret-scan
  image: python:3.12-slim
  before_script:
    - pip install git-filter-repo --quiet
  script:
    - |
      echo "Scanning commit history for leaked GitLab PATs..."
      git log --all -p | grep -E "glpat-[A-Za-z0-9_-]{20,}" && echo "LEAKED TOKEN DETECTED" && exit 1 || echo "No leaked tokens found."
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH =~ /^(main|master)$/'
